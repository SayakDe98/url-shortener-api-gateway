name: Deploy API Gateway to ECR

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: api-gateway
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Clean up old ECR images
        env:
          ECR_REPOSITORY: api-gateway
        run: |
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name $ECR_REPOSITORY \
            --filter tagStatus=UNTAGGED \
            --query 'imageIds[*]' \
            --output json)

          if [ "$IMAGE_IDS" != "[]" ]; then
            aws ecr batch-delete-image \
              --repository-name $ECR_REPOSITORY \
              --image-ids "$IMAGE_IDS"
          fi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,PORT,GRPC_TARGET,ANALYTICS_GRPC_TARGET,BASE_URL,FRONTEND_URL
          script: |
            ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY=api-gateway
            IMAGE_TAG=${{ github.sha }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            PORT=${{ secrets.PORT }}
            GRPC_TARGET=${{ secrets.GRPC_TARGET }}
            ANALYTICS_GRPC_TARGET=${{ secrets.ANALYTICS_GRPC_TARGET }}
            BASE_URL=${{ secrets.BASE_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}

            aws ecr get-login-password --region $AWS_REGION | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest

            docker stop api-gateway || true
            docker rm api-gateway || true

            docker run -d \
              --name api-gateway \
              --restart unless-stopped \
              -p 3000:3000 \
              -e PORT=$PORT \
              -e GRPC_TARGET=$GRPC_TARGET \
              -e ANALYTICS_GRPC_TARGET=$ANALYTICS_GRPC_TARGET \
              -e BASE_URL=$BASE_URL \
              -e FRONTEND_URL=$FRONTEND_URL \
              $ECR_REGISTRY/$ECR_REPOSITORY:latest

            docker image prune -f